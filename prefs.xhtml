<groupbox xmlns:html="http://www.w3.org/1999/xhtml" onload="(function(){
  var PREFIX = 'extensions.paper-partner.';
  var DEFAULTS = {
    apiKey: '',
    apiEndpoint: 'https://api.deepseek.com/v1/chat/completions',
    model: 'deepseek-chat',
    answerMode: 'brief',
    triggerDelay: 'medium'
  };
  Object.keys(DEFAULTS).forEach(function(key) {
    var el = document.getElementById('pp-' + key);
    if (!el) return;
    try {
      var v = Zotero.Prefs.get(PREFIX + key, true);
      el.value = (v !== undefined &amp;&amp; v !== null) ? v : DEFAULTS[key];
    } catch(e) { el.value = DEFAULTS[key]; }
    el.addEventListener('input', function() {
      Zotero.Prefs.set(PREFIX + key, el.value, true);
    });
    el.addEventListener('change', function() {
      Zotero.Prefs.set(PREFIX + key, el.value, true);
    });
  });
})()">
  <label><html:h2>Paper Partner</html:h2></label>

  <hbox align="center" style="margin-top: 8px">
    <label value="API Key" style="min-width: 110px"/>
    <html:input type="password" id="pp-apiKey" flex="1" style="margin-left: 4px"/>
  </hbox>

  <hbox align="center" style="margin-top: 6px">
    <label value="API Endpoint" style="min-width: 110px"/>
    <html:input type="text" id="pp-apiEndpoint" flex="1" style="margin-left: 4px"/>
  </hbox>

  <hbox align="center" style="margin-top: 6px">
    <label value="Model" style="min-width: 110px"/>
    <html:input type="text" id="pp-model" flex="1" style="margin-left: 4px"/>
  </hbox>

  <hbox align="center" style="margin-top: 6px">
    <label value="Answer Mode" style="min-width: 110px"/>
    <html:select id="pp-answerMode" flex="1" style="margin-left: 4px">
      <html:option value="brief">Brief</html:option>
      <html:option value="detailed">Detailed</html:option>
    </html:select>
  </hbox>

  <hbox align="center" style="margin-top: 6px">
    <label value="Trigger Delay" style="min-width: 110px"/>
    <html:select id="pp-triggerDelay" flex="1" style="margin-left: 4px">
      <html:option value="immediate">Immediate (0s)</html:option>
      <html:option value="short">Short (1s)</html:option>
      <html:option value="medium">Medium (2s)</html:option>
      <html:option value="long">Long (3s)</html:option>
    </html:select>
  </hbox>
</groupbox>
